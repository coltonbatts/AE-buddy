<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motion Buddy</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main class="panel-shell">
      <section class="panel-card" aria-labelledby="panel-title">
        <header class="panel-header">
          <p class="eyebrow">After Effects CEP</p>
          <h1 id="panel-title">Motion Buddy</h1>
          <p class="panel-copy">
            Prompt, generate, and apply in one panel.
          </p>
        </header>

        <form id="motionBuddyForm" class="panel-form">
          <label class="field-label" for="promptInput">Prompt</label>
          <textarea
            id="promptInput"
            name="prompt"
            class="prompt-input"
            rows="8"
            placeholder="Offset selected layers by 5 frames"
            spellcheck="false"></textarea>

          <div class="panel-actions">
            <button id="generateButton" type="submit" class="generate-button">
              Generate &amp; Apply
            </button>

            <div id="statusPill" class="status-pill" data-state="idle" aria-live="polite">
              <span class="status-dot" aria-hidden="true"></span>
              <span id="statusText">Idle</span>
            </div>
          </div>
        </form>

        <section class="console-wrap" aria-labelledby="console-title">
          <div class="console-heading">
            <h2 id="console-title">Panel Log</h2>
            <button id="clearLogButton" type="button" class="ghost-button">
              Clear
            </button>
          </div>
          <pre id="logConsole" class="log-console" aria-live="polite">Ready.</pre>
        </section>
      </section>
    </main>

    <!--
      Copy the official Adobe CSInterface.js file into:
      ./js/vendor/CSInterface.js

      The panel still renders without it, but none of the host calls will work.
    -->
    <script src="./js/vendor/CSInterface.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
